<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer cube frame -->
  <path d="M100 20 L160 60 L160 140 L100 180 L40 140 L40 60 Z" 
        stroke="url(#gradient1)" 
        stroke-width="3" 
        fill="none" 
        opacity="0.6"/>
  
  <!-- Inner cube -->
  <path d="M100 50 L140 75 L140 125 L100 150 L60 125 L60 75 Z" 
        fill="url(#gradient1)" 
        opacity="0.3"/>
  
  <!-- B letter stylized as cube -->
  <path d="M70 80 L70 120 L95 120 C105 120 110 115 110 105 C110 100 107 97 103 95 C107 93 110 90 110 85 C110 75 105 80 95 80 Z M80 88 L92 88 C97 88 100 90 100 95 C100 100 97 102 92 102 L80 102 Z M80 108 L93 108 C98 108 101 110 101 115 C101 120 98 122 93 122 L80 122 Z" 
        fill="url(#gradient2)" 
        filter="url(#glow)"
        transform="translate(10, -10)"/>
  
  <!-- Cubic superscript 3 -->
  <text x="125" y="85" 
        font-family="Arial, sans-serif" 
        font-size="28" 
        font-weight="bold" 
        fill="url(#gradient1)"
        filter="url(#glow)">³</text>
  
  <!-- Connection lines -->
  <line x1="100" y1="20" x2="100" y2="50" stroke="url(#gradient1)" stroke-width="2" opacity="0.4"/>
  <line x1="40" y1="60" x2="60" y2="75" stroke="url(#gradient1)" stroke-width="2" opacity="0.4"/>
  <line x1="160" y1="60" x2="140" y2="75" stroke="url(#gradient1)" stroke-width="2" opacity="0.4"/>
  
  <!-- Accent dots -->
  <circle cx="100" cy="20" r="4" fill="#3b82f6" filter="url(#glow)"/>
  <circle cx="40" cy="60" r="4" fill="#8b5cf6" filter="url(#glow)"/>
  <circle cx="160" cy="60" r="4" fill="#3b82f6" filter="url(#glow)"/>
  <circle cx="100" cy="180" r="4" fill="#8b5cf6" filter="url(#glow)"/>
</svg>
